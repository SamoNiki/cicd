on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      artifact-name: ${{ steps.build.outputs.name }}
    steps:
      - id: set-version
        run: |
          VERSION=$(date +%Y%m%d-%H%M%S)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - id: build
        run: |
          echo "name=my-app-${{ steps.set-version.outputs.version }}.tar.gz" >> $GITHUB_OUTPUT
          tar -czf my-app.tar.gz src/
      
      - uses: actions/upload-artifact@v4
        with:
          name: my-app-${{ steps.set-version.outputs.version }}.tar.gz
          path: my-app.tar.gz
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploying version: ${{ needs.build.outputs.version }}"
          echo "Artifact: ${{ needs.build.outputs.artifact-name }}"